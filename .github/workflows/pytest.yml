name: django 

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] 

jobs:
  run_pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with: 
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      # Optional: upload results (only if you generate a file)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: my-resume




  build_job:
    needs: run_pytest
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t my-app:latest .

      - name: Run tests inside container
        run: |
          docker run my-app:latest pytest


 

  Deploy_job:
    needs: build_job
    runs-on: ubuntu-latest

    steps:   

      - name: checkout repository
        uses: action/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
         role-arn: ${{ secrets.AWS_GIT_ARN }}
         aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build -t django-app .

      - name: Tag image
        run: |
          docker tag django-app:latest ${{ secrets.ECR_ACCESS_ROLE }}:latest

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_ACCESS_ROLE }}:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
           --cluster django-cluster \
           --service django-service \
           --force-new-deployment   
      